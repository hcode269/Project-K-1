<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- reset css -->
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <!-- embed font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- style css -->
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>DISHES</title>
  </head>
  <body>
    <!-- ==========================HEADER=================== -->
    <header class="header fixed">
      <div class="container">
        <div class="body">
          <!-- Logo -->
          <a href="#!"
            ><img
              src="./assets/img/logo.svg"
              alt="NutriPlanerLogo"
              class="logo"
          /></a>
          <!-- Action -->
          <div class="actions">
            <div class="search">
              <img
                src="./assets/img/search_icon.svg"
                alt="searchicon"
                class="searchicon"
              />
              <input type="text" placeholder="SEARCH" class="search_input" />
            </div>
            <nav class="nav">
              <ul>
                <li><a href="#!">HOMEPAGE</a></li>
                <li><a href="#!">MEAL TYPE</a></li>
                <li class="active"><a href="#!">DISHES</a></li>
                <li><a href="#!">NUTRITION CALCULATOR</a></li>
                <li><a href="#!">CONTACT US</a></li>
              </ul>
            </nav>
          </div>
          <!-- Account -->
          <div class="account">
            <img
              src="./assets/img/ava_user.jpg"
              alt="ava_user"
              class="ava_user"
            />
            <span>HUY PHÙNG</span>
          </div>
        </div>
      </div>
    </header>
    <!-- ==========================MAIN=================== -->
    <main>
      <div class="banner">
        <h1 class="name_page">DISHES</h1>
        <div class="desc_page container">
          <h2 class="title">Discover The Perfect Meal For Your Goals.</h2>
          <p class="desc">
            Explore detailed nutrition facts, ingredients, and personalized tips
            to make every bite count.
          </p>
        </div>
      </div>
      <div class="line-main range"></div>

      <div class="main-content-dish container">
        <div class="box-dish-name">
          <p class="dish-name">PHỞ LÝ QUỐC SƯ</p>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="container footer1" style="margin-top: 1000px">
      <div class="logo_footer">
        <a href="#!"
          ><img src="./assets/img/logo.svg" alt="logo" class="logo_ft"
        /></a>
      </div>
      <p class="content_ft">&#169; 2025 NUTRITION PLANNER</p>
      <div class="content_ft_left">
        <p class="desc_ft">TERM</p>
        <p class="desc_ft">PRIVACY</p>
        <p class="desc_ft">COOKIES</p>
      </div>
    </footer>
  </body>
</html>
